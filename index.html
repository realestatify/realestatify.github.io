<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta description="Rent Application Form" />
    <title>Rent Application Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.orange.min.css" />
    <link rel="icon" href="favicon.ico" sizes="48x48" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="favicon-192.png" type="image/png" sizes="192x192" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <style>
      :root {
        --pico-form-element-spacing-vertical: 0.35rem;
        --pico-form-element-spacing-horizontal: 0.75rem;
        --pico-font-size: 1rem;
      }
      abbr[title="required"] {
        color: var(--pico-del-color);
        text-decoration: none;
      }
      #step-indicator {
        color: var(--pico-muted-color);
        font-size: 0.875rem;
        margin-bottom: 0.5rem;
      }
    </style>
  </head>
  <body>
    <header class="container">
      <hgroup>
        <h1>20 Cross st., Kogarah Application</h1>
      </hgroup>
    </header>
    <main class="container">
      <form id="rent-application" action="https://formspree.io/f/xgopozbe" method="POST" enctype="multipart/form-data">
        <p id="step-indicator">Step 1 of 7</p>

        <!-- Step 1: Application details -->
        <section class="form-step" data-step="1">
          <h2>Application</h2>
          <article>
            <header><h3>Lease</h3></header>
            <fieldset class="grid">
              <label for="lease-term"
                >Lease Term <abbr title="required">*</abbr>
                <select id="lease-term" name="lease_term" aria-label="Lease Term" required aria-required="true">
                  <option disabled value="6">6 months</option>
                  <option selected value="12">12 months</option>
                  <option value="24">2 years</option>
                </select>
              </label>
              <label for="lease-commencement-date"
                >Lease commencement date <abbr title="required">*</abbr>
                <input
                  type="date"
                  id="lease-commencement-date"
                  name="lease_commencement_date"
                  required
                  aria-required="true"
                />
              </label>
            </fieldset>

            <fieldset class="grid">
              <label for="payment-method"
                >Preferred payment method <abbr title="required">*</abbr>
                <select
                  id="payment-method"
                  name="payment_method"
                  aria-label="Payment method"
                  required
                  aria-required="true"
                >
                  <option selected value="fortnightly">Fortnightly</option>
                  <option value="monthly">Monthly</option>
                </select>
              </label>

              <label for="bond"
                >How do you want to lodge bond <abbr title="required">*</abbr>
                <select id="bond" name="bond" aria-label="Bond" required aria-required="true">
                  <option selected value="rbo">Directly online via RBO</option>
                  <option value="landlord">Via landlord</option>
                </select>
              </label>
            </fieldset>

            <label for="inspected">
              <input type="checkbox" id="inspected" name="inspected" role="switch" />
              Have you inspected the property?
            </label>

            <label for="about-me"
              >About Me:
              <textarea
                id="about-me"
                name="about_me"
                maxlength="3000"
                rows="5"
                placeholder="Tell us a little about yourself — your lifestyle, why you're moving, and anything else that might help your application stand out."
              ></textarea>
              <small><span id="about-me-count">0</span>/3000</small>
            </label>
          </article>
        </section>

        <!-- Step 2: Personal details -->
        <section class="form-step" data-step="2" hidden>
          <h2>Personal</h2>
          <article>
            <header><h3>Personal details</h3></header>
            <fieldset class="grid">
              <label for="first-name"
                >First name <abbr title="required">*</abbr>
                <input
                  type="text"
                  id="first-name"
                  name="first_name"
                  placeholder="First name"
                  autocomplete="given-name"
                  required
                  aria-required="true"
                />
              </label>
              <label for="last-name"
                >Last name <abbr title="required">*</abbr>
                <input
                  type="text"
                  id="last-name"
                  name="last_name"
                  placeholder="Last name"
                  autocomplete="family-name"
                  required
                  aria-required="true"
                />
              </label>
            </fieldset>

            <label for="dob"
              >Date of birth <abbr title="required">*</abbr>
              <input type="date" id="dob" name="dob" min="1900-01-01" max="2023-01-01" required aria-required="true" />
            </label>

            <fieldset class="grid">
              <label for="phone"
                >Phone <abbr title="required">*</abbr>
                <input
                  type="tel"
                  id="phone"
                  name="phone"
                  placeholder="e.g. 0412 345 678"
                  autocomplete="tel"
                  required
                  aria-required="true"
                />
              </label>

              <label for="email"
                >Email <abbr title="required">*</abbr>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="you@example.com"
                  autocomplete="email"
                  required
                  aria-required="true"
                />
              </label>
            </fieldset>

            <label for="poi"
              >Proof of identity
              <input type="file" id="poi" name="poi" accept=".doc, .jpg, .jpeg, .pdf, .png" multiple />
            </label>
          </article>
        </section>

        <!-- Step 3: Address history -->
        <section class="form-step" data-step="3" hidden>
          <h2>Personal</h2>
          <h3>Address history</h3>
          <article>
            <header><h4>Current address</h4></header>

            <label for="street-address"
              >Street address
              <input
                type="text"
                id="street-address"
                name="street_address"
                placeholder="Street address"
                autocomplete="street-address"
              />
            </label>

            <fieldset class="grid">
              <label for="suburb"
                >Suburb
                <input type="text" id="suburb" name="suburb" placeholder="Suburb" />
              </label>
              <label for="postcode"
                >Postcode
                <input type="text" id="postcode" name="postcode" placeholder="0000" maxlength="4" pattern="\d{4}" />
              </label>
              <label for="state"
                >State
                <select id="state" name="state" aria-label="Select state">
                  <option selected disabled value="">Select state</option>
                  <option value="ACT">ACT</option>
                  <option value="NSW">NSW</option>
                  <option value="NT">NT</option>
                  <option value="QLD">QLD</option>
                  <option value="SA">SA</option>
                  <option value="TAS">TAS</option>
                  <option value="VIC">VIC</option>
                  <option value="WA">WA</option>
                </select>
              </label>
            </fieldset>

            <label for="movein"
              >Move-in date
              <input type="date" id="movein" name="movein" min="1900-01-01" />
            </label>
          </article>

          <div id="prev-addresses-container"></div>

          <button type="button" id="btn-add-prev-address" class="secondary outline">Add previous address...</button>

          <template id="prev-address-template">
            <article>
              <header><h4>Previous address</h4></header>
              <label for="prev-address-street-__INDEX__"
                >Street address
                <input
                  type="text"
                  id="prev-address-street-__INDEX__"
                  name="prev_address[__INDEX__][street]"
                  placeholder="Street address"
                />
              </label>
              <fieldset class="grid">
                <label for="prev-address-suburb-__INDEX__"
                  >Suburb
                  <input
                    type="text"
                    id="prev-address-suburb-__INDEX__"
                    name="prev_address[__INDEX__][suburb]"
                    placeholder="Suburb"
                  />
                </label>
                <label for="prev-address-postcode-__INDEX__"
                  >Postcode
                  <input
                    type="text"
                    id="prev-address-postcode-__INDEX__"
                    name="prev_address[__INDEX__][postcode]"
                    placeholder="0000"
                    maxlength="4"
                    pattern="\d{4}"
                  />
                </label>
                <label for="prev-address-state-__INDEX__"
                  >State
                  <select
                    id="prev-address-state-__INDEX__"
                    name="prev_address[__INDEX__][state]"
                    aria-label="Select state"
                  >
                    <option selected disabled value="">Select state</option>
                    <option value="ACT">ACT</option>
                    <option value="NSW">NSW</option>
                    <option value="NT">NT</option>
                    <option value="QLD">QLD</option>
                    <option value="SA">SA</option>
                    <option value="TAS">TAS</option>
                    <option value="VIC">VIC</option>
                    <option value="WA">WA</option>
                  </select>
                </label>
              </fieldset>
              <fieldset class="grid">
                <label for="prev-address-movein-__INDEX__"
                  >Move-in date
                  <input
                    type="date"
                    id="prev-address-movein-__INDEX__"
                    name="prev_address[__INDEX__][movein]"
                    min="1900-01-01"
                  />
                </label>
                <label for="prev-address-moveout-__INDEX__"
                  >Move-out date
                  <input
                    type="date"
                    id="prev-address-moveout-__INDEX__"
                    name="prev_address[__INDEX__][moveout]"
                    min="1900-01-01"
                  />
                </label>
              </fieldset>
              <button type="button" class="secondary outline btn-remove-prev-address">Remove</button>
            </article>
          </template>
        </section>

        <!-- Step 4: Employment -->
        <section class="form-step" data-step="4" hidden>
          <h2>Personal</h2>
          <h3>
            Employment
            <abbr
              title="Provide your current employment details. This helps us verify your ability to meet rental payments."
              >*</abbr
            >
          </h3>

          <div id="employments-container"></div>

          <nav>
            <ul style="align-items: baseline">
              <li>
                <button type="button" id="btn-add-employment" class="secondary outline">Add employment</button>
              </li>
              <li>
                <label for="currently-unemployed">
                  <input type="checkbox" id="currently-unemployed" name="currently_unemployed" role="switch" />
                  Currently unemployed
                </label>
              </li>
            </ul>
          </nav>

          <template id="employment-template">
            <article>
              <header><h4>Employment</h4></header>
              <label for="employment-company-__INDEX__"
                >Company / Employer <abbr title="required">*</abbr>
                <input
                  type="text"
                  id="employment-company-__INDEX__"
                  name="employment[__INDEX__][company]"
                  placeholder="Company name"
                  required
                  aria-required="true"
                />
              </label>
              <label for="employment-role-__INDEX__"
                >Role / Title <abbr title="required">*</abbr>
                <input
                  type="text"
                  id="employment-role-__INDEX__"
                  name="employment[__INDEX__][role]"
                  placeholder="Job title"
                  required
                  aria-required="true"
                />
              </label>
              <fieldset class="grid">
                <label for="employment-type-__INDEX__"
                  >Employment type <abbr title="required">*</abbr>
                  <select
                    id="employment-type-__INDEX__"
                    name="employment[__INDEX__][type]"
                    aria-label="Select type"
                    required
                    aria-required="true"
                  >
                    <option selected disabled value="">Select type</option>
                    <option value="full-time">Full-time</option>
                    <option value="part-time">Part-time</option>
                    <option value="casual">Casual</option>
                    <option value="self-employed">Self-employed</option>
                    <option value="contractor">Contractor</option>
                    <option value="retired">Retired</option>
                    <option value="student">Student</option>
                    <option value="other">Other</option>
                  </select>
                </label>
                <label for="employment-start-__INDEX__"
                  >Start date <abbr title="required">*</abbr>
                  <input
                    type="date"
                    id="employment-start-__INDEX__"
                    name="employment[__INDEX__][start_date]"
                    min="1900-01-01"
                    required
                    aria-required="true"
                  />
                </label>
              </fieldset>
              <button type="button" class="secondary outline btn-remove-employment">Remove</button>
            </article>
          </template>

          <article>
            <header><h4>Employment reference</h4></header>

            <label for="ref-type"
              >Reference type
              <select id="ref-type" name="ref_type" aria-label="Select type">
                <option selected disabled value="">Select type</option>
                <option value="employer">Employer / Manager</option>
                <option value="hr">HR department</option>
                <option value="colleague">Colleague</option>
                <option value="other">Other</option>
              </select>
            </label>

            <label for="ref-name"
              >Full name
              <input type="text" id="ref-name" name="ref_name" placeholder="Reference full name" />
            </label>

            <fieldset class="grid">
              <label for="ref-phone"
                >Phone
                <input type="tel" id="ref-phone" name="ref_phone" placeholder="e.g. 0412 345 678" />
              </label>

              <label for="ref-email"
                >Email
                <input type="email" id="ref-email" name="ref_email" placeholder="reference@example.com" />
              </label>
            </fieldset>
          </article>
        </section>

        <!-- Step 5: Finances -->
        <section class="form-step" data-step="5" hidden>
          <h2>Personal</h2>
          <h3>Finances</h3>

          <div id="incomes-container"></div>

          <nav>
            <ul style="align-items: baseline">
              <li>
                <button type="button" id="btn-add-income" class="secondary outline">Add source of income</button>
              </li>
              <li>
                <label for="no-income">
                  <input type="checkbox" id="no-income" name="no_income" role="switch" />
                  I have no income
                </label>
              </li>
            </ul>
          </nav>

          <template id="income-template">
            <article>
              <header><h4>Income source</h4></header>
              <fieldset class="grid">
                <label for="income-type-__INDEX__"
                  >Income type <abbr title="required">*</abbr>
                  <select
                    id="income-type-__INDEX__"
                    name="income[__INDEX__][type]"
                    aria-label="Select type"
                    required
                    aria-required="true"
                  >
                    <option selected disabled value="">Select type</option>
                    <option value="salary">Salary / Wages</option>
                    <option value="self-employed">Self-employed</option>
                    <option value="centrelink">Centrelink / Government benefits</option>
                    <option value="rental">Rental income</option>
                    <option value="investments">Investments</option>
                    <option value="other">Other</option>
                  </select>
                </label>
                <label for="income-amount-__INDEX__"
                  >Income amount (per week) <abbr title="required">*</abbr>
                  <input
                    type="number"
                    id="income-amount-__INDEX__"
                    name="income[__INDEX__][amount]"
                    placeholder="0.00"
                    min="0"
                    step="0.01"
                    required
                    aria-required="true"
                  />
                </label>
              </fieldset>
              <button type="button" class="secondary outline btn-remove-income">Remove</button>
            </article>
          </template>
        </section>

        <!-- Step 6: Emergency contact -->
        <section class="form-step" data-step="6" hidden>
          <h2>Personal</h2>
          <article>
            <header><h3>Emergency contact</h3></header>
            <label for="ec-name"
              >Full name <abbr title="required">*</abbr>
              <input
                type="text"
                id="ec-name"
                name="ec_name"
                placeholder="Emergency contact name"
                required
                aria-required="true"
              />
            </label>

            <label for="ec-relationship"
              >Relationship <abbr title="required">*</abbr>
              <select
                id="ec-relationship"
                name="ec_relationship"
                aria-label="Select relationship"
                required
                aria-required="true"
              >
                <option selected disabled value="">Select relationship</option>
                <option value="parent">Parent</option>
                <option value="sibling">Sibling</option>
                <option value="partner">Partner / Spouse</option>
                <option value="friend">Friend</option>
                <option value="colleague">Colleague</option>
                <option value="other">Other</option>
              </select>
            </label>

            <fieldset class="grid">
              <label for="ec-phone"
                >Phone <abbr title="required">*</abbr>
                <input
                  type="tel"
                  id="ec-phone"
                  name="ec_phone"
                  placeholder="e.g. 0412 345 678"
                  required
                  aria-required="true"
                />
              </label>

              <label for="ec-email"
                >Email
                <input type="email" id="ec-email" name="ec_email" placeholder="emergency@example.com" />
              </label>
            </fieldset>
          </article>
        </section>

        <!-- Step 7: People -->
        <section class="form-step" data-step="7" hidden>
          <h2>Household</h2>
          <h3>People <abbr title="Will anyone else be living with you?">*</abbr></h3>

          <div id="occupants-container"></div>

          <nav>
            <ul style="align-items: baseline">
              <li>
                <button type="button" id="btn-add-occupant" class="secondary outline">Add occupant</button>
              </li>
              <li>
                <label for="no-ex-occupant">
                  <input type="checkbox" id="no-ex-occupant" name="no_ex_occupant" role="switch" />
                  I'll be the only occupant
                </label>
              </li>
              <li>
                <label for="smoking">
                  <input type="checkbox" id="smoking" name="smoking" role="switch" />
                  Do any of the occupants smoke?
                </label>
              </li>
            </ul>
          </nav>

          <template id="occupant-template">
            <article>
              <header><h4>Additional occupant</h4></header>
              <fieldset class="grid">
                <label for="occupant-first-name-__INDEX__"
                  >First name <abbr title="required">*</abbr>
                  <input
                    type="text"
                    id="occupant-first-name-__INDEX__"
                    name="occupant[__INDEX__][first_name]"
                    placeholder="First name"
                    required
                    aria-required="true"
                  />
                </label>
                <label for="occupant-last-name-__INDEX__"
                  >Last name <abbr title="required">*</abbr>
                  <input
                    type="text"
                    id="occupant-last-name-__INDEX__"
                    name="occupant[__INDEX__][last_name]"
                    placeholder="Last name"
                    required
                    aria-required="true"
                  />
                </label>
                <label for="occupant-age-__INDEX__"
                  >Age <abbr title="required">*</abbr>
                  <input
                    type="number"
                    id="occupant-age-__INDEX__"
                    name="occupant[__INDEX__][age]"
                    placeholder="0"
                    min="0"
                    step="1"
                    required
                    aria-required="true"
                  />
                </label>
              </fieldset>
              <button type="button" class="secondary outline btn-remove-occupant">Remove</button>
            </article>
          </template>

          <hr />

          <h3>Pets</h3>

          <div id="pets-container"></div>

          <nav>
            <ul style="align-items: baseline">
              <li>
                <button type="button" id="btn-add-pet" class="secondary outline">Add pets</button>
              </li>
              <li>
                <label for="no-pets">
                  <input type="checkbox" id="no-pets" name="no_pets" role="switch" />
                  No pets
                </label>
              </li>
            </ul>
          </nav>

          <template id="pet-template">
            <article>
              <header><h4>Additional pet</h4></header>
              <fieldset class="grid">
                <label for="pet-breed-__INDEX__"
                  >Pet breed <abbr title="required">*</abbr>
                  <input
                    type="text"
                    id="pet-breed-__INDEX__"
                    name="pet[__INDEX__][breed]"
                    placeholder="Pet breed"
                    required
                    aria-required="true"
                  />
                </label>
                <label for="pet-age-__INDEX__"
                  >Age <abbr title="required">*</abbr>
                  <input
                    type="number"
                    id="pet-age-__INDEX__"
                    name="pet[__INDEX__][age]"
                    placeholder="0"
                    min="0"
                    step="1"
                    required
                    aria-required="true"
                  />
                </label>
              </fieldset>
              <button type="button" class="secondary outline btn-remove-pet">Remove</button>
            </article>
          </template>
        </section>

        <!-- Navigation -->
        <nav>
          <ul>
            <li><button type="button" id="btn-back" role="button" class="secondary" hidden>Back</button></li>
          </ul>
          <ul>
            <li><button type="button" id="btn-next">Next</button></li>
            <li><button type="submit" id="btn-submit" form="rent-application" hidden>Submit application</button></li>
          </ul>
        </nav>
      </form>
    </main>

    <script src="app.js"></script>
  </body>
</html>
